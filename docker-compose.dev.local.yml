services:
  postgres:
    image: postgres:16-alpine
    container_name: domus-local-postgres
    restart: "no"
    command: -p ${POSTGRES_PORT:-5432}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-domus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-domus}
      POSTGRES_DB: ${POSTGRES_DB:-domus}
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-domus} -p ${POSTGRES_PORT:-5432}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: domus-local-redis
    restart: "no"
    command: --port ${REDIS_PORT:-6379}
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: domus-local-pgadmin
    restart: "no"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@domus.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  postgres-local-data:
  pgadmin-data:
