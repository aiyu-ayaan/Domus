services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      # Browser-side vars: baked in at build time. Defaults to the host
      # (PUBLIC_HOST) at the published API_PORT; set PUBLIC_API_URL to a full URL
      # (e.g. https://api.example.com) for a reverse proxy / external domain.
      # Rebuild web after changing it — NEXT_PUBLIC_* is baked, not runtime.
      args:
        NEXT_PUBLIC_USE_MOCK_API: ${NEXT_PUBLIC_USE_MOCK_API:-false}
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://${PUBLIC_HOST:-localhost}:${API_PORT:-8000}}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://domus:domus@postgres:${POSTGRES_PORT:-5432}/domus
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}/0
      # CORS is assembled by the API from WEB_PORT + PUBLIC_HOST + EXTRA_CORS_ORIGINS
      # (all injected via env_file: .env). Add your public web origin to
      # EXTRA_CORS_ORIGINS, e.g. https://domus.example.com.
      - ENVIRONMENT=production
      - DEBUG=false
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Pi 5 has 8 GB — cap the API so a runaway poll loop can't starve everything else.
          memory: 512m
          cpus: '2'

  postgres:
    image: postgres:16-alpine
    command: -p ${POSTGRES_PORT:-5432}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-domus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-domus}
      POSTGRES_DB: ${POSTGRES_DB:-domus}
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-domus} -p ${POSTGRES_PORT:-5432}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: --port ${REDIS_PORT:-6379}
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
