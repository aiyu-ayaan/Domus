services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      # Browser-side vars: baked in at build time. The browser reaches the API on
      # the host (PUBLIC_HOST) at the published API_PORT — never the internal
      # api:8000. Composed from .env so the port lives in exactly one place.
      args:
        NEXT_PUBLIC_USE_MOCK_API: ${NEXT_PUBLIC_USE_MOCK_API:-false}
        NEXT_PUBLIC_API_URL: http://${PUBLIC_HOST:-localhost}:${API_PORT:-8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://domus:domus@postgres:${POSTGRES_PORT:-5432}/domus
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}/0
      # Allow the web UI from this host on both localhost and PUBLIC_HOST (LAN IP),
      # composed from the same port var the web service is published on.
      - CORS_ORIGINS=["http://localhost:${WEB_PORT:-3000}","http://${PUBLIC_HOST:-localhost}:${WEB_PORT:-3000}"]
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    command: -p ${POSTGRES_PORT:-5432}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-domus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-domus}
      POSTGRES_DB: ${POSTGRES_DB:-domus}
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-domus} -p ${POSTGRES_PORT:-5432}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: --port ${REDIS_PORT:-6379}
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
