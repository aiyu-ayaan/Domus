# Local dev databases only — Postgres + Redis.
# Run the API itself on the host (uvicorn) against these. Handy on Windows + WSL:
#
#   docker compose -f docker.dev.yml up -d
#   cd apps/api && alembic upgrade head && uvicorn backend.main:app --reload
#
# Defaults match apps/api/backend/core/config.py, so no .env is required to start.
services:
  postgres:
    image: postgres:16-alpine
    container_name: domus-dev-postgres
    command: -p ${POSTGRES_PORT:-5432}
    environment:
      POSTGRES_USER: domus
      POSTGRES_PASSWORD: domus
      POSTGRES_DB: domus
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - domus-dev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domus -p ${POSTGRES_PORT:-5432}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: domus-dev-redis
    command: --port ${REDIS_PORT:-6379}
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  domus-dev-pgdata:
